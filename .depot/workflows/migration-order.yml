# Depot CI Migration
# Source: .github/workflows/migration-order.yml
#
# Changes made:
# - Changed runs-on from "blacksmith-4vcpu-ubuntu-2404" to "depot-ubuntu-latest" in job "migration-order"

name: Migration Order
on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
permissions:
  contents: read
concurrency:
  group: migration-order-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
jobs:
  migration-order:
    name: Migration order
    runs-on: depot-ubuntu-latest # was: blacksmith-4vcpu-ubuntu-2404. Nonstandard GitHub runner label detected, changed to default Depot runner.
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Check Alembic migration order
        run: python scripts/check_migration_order.py origin/main
