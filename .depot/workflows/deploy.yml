# Depot CI Migration
# Source: .github/workflows/deploy.yml
#
# Changes made:
# - Changed runs-on from "blacksmith-4vcpu-ubuntu-2404" to "depot-ubuntu-latest" in job "deploy"

name: Deploy
# Push to `dev`  -> deploy to the dev app VM  (ditto-platform-dev)
# Push to `main` -> deploy to the prod app VM (ditto-platform-prod)
#
# Persistent infra (VMs, Postgres, buckets, DNS, the deploy SA) is provisioned
# out of band by the infra repo's envs/gcp-platform Terraform + Ansible. This
# workflow only ships new code: it authenticates via Workload Identity Federation
# (no static keys), IAP-SSHes into the matching VM, and runs scripts/update.sh
# (fetch -> reset -> uv sync -> load the optional Taostats key directly from
# Secret Manager -> ensure Pylon -> migrate -> pm2 reload).
#
# GitHub secrets (no values committed):
#   Repo-level:
#     GCP_WIF_PROVIDER        full `github` WIF provider resource name
#                             (gcp-platform output `wif_provider`)
#     GCP_PLATFORM_DEPLOY_SA  github-actions-platform-deploy@ditto-app-dev.iam.gserviceaccount.com
#                             (gcp-platform output `platform_deploy_sa_email`)
#   Per-Environment (`dev` and `prod` GitHub Environments):
#     DITTO_UPLOAD_PAYMENT_ADDRESS  (secret) the env's SS58 upload-fee receive
#       address. Injected into the VM's .env at deploy time (NOT stored in infra).
#       The `prod` environment is where you add required reviewers if you want a
#       manual gate before prod deploys.
#     DITTO_DASHBOARD_WANDB_URL     (variable, optional) public wandb project URL
#       shown as the dashboard's "full telemetry" link, e.g.
#       https://wandb.ai/<entity>/ditto-sn118. Upserted into .env by update.sh;
#       unset just leaves the SPA's default link.
on:
  push:
    branches: [dev, main]
  # Manual redeploy without a code push — e.g. to pick up a changed repo
  # variable/secret (DITTO_DASHBOARD_WANDB_URL, DITTO_UPLOAD_PAYMENT_ADDRESS)
  # into the VM .env. Target VM follows the branch it's dispatched on
  # (main -> prod, anything else -> dev), same as the push path.
  workflow_dispatch:
permissions:
  contents: read
  id-token: write # OIDC -> GCP WIF
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: depot-ubuntu-latest # was: blacksmith-4vcpu-ubuntu-2404. Nonstandard GitHub runner label detected, changed to default Depot runner.
    # GitHub Environment selects the per-env DITTO_UPLOAD_PAYMENT_ADDRESS secret
    # (and enables optional required-reviewer gating on prod).
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    env:
      GCP_ZONE: us-central1-a
    steps:
      - name: Resolve target from branch
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "vm=ditto-platform-prod"        >> "$GITHUB_OUTPUT"
            echo "host=platform-api.heyditto.ai" >> "$GITHUB_OUTPUT"
            echo "branch=main"                   >> "$GITHUB_OUTPUT"
          else
            echo "vm=ditto-platform-dev"             >> "$GITHUB_OUTPUT"
            echo "host=platform-api-dev.heyditto.ai" >> "$GITHUB_OUTPUT"
            echo "branch=dev"                        >> "$GITHUB_OUTPUT"
          fi
      - name: Verify deploy config
        # Fail with a legible message if the WIF secrets aren't set, instead of
        # the opaque "must specify exactly one of workload_identity_provider…".
        env:
          WIF: ${{ secrets.GCP_WIF_PROVIDER }}
          SA: ${{ secrets.GCP_PLATFORM_DEPLOY_SA }}
        run: |
          : "${WIF:?GCP_WIF_PROVIDER repo secret is not set — see this workflow's header}"
          : "${SA:?GCP_PLATFORM_DEPLOY_SA repo secret is not set — see this workflow's header}"
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PLATFORM_DEPLOY_SA }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Deploy (IAP SSH -> scripts/update.sh)
        # `sudo -iu deploy bash -lc` runs a LOGIN shell as deploy so uv/pm2/docker
        # are on PATH (a bare `sudo -u deploy` uses a minimal secure_path and
        # would fail on `uv`/`pm2`). DITTO_UPLOAD_PAYMENT_ADDRESS is the env-scoped
        # GitHub secret (a public on-chain receive address); update.sh upserts it
        # into the VM's .env before (re)starting. The optional Taostats API key is
        # read on the VM from `platform-taostats-api-key` in Secret Manager via
        # the attached runtime service account, never passed through this job.
        run: |
          gcloud compute ssh "${{ steps.target.outputs.vm }}" \
            --zone "$GCP_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "sudo -iu deploy bash -lc 'cd /opt/ditto-platform && DITTO_DEPLOY_BRANCH=${{ steps.target.outputs.branch }} DITTO_UPLOAD_PAYMENT_ADDRESS=${{ secrets.DITTO_UPLOAD_PAYMENT_ADDRESS }} DITTO_DASHBOARD_WANDB_URL=${{ vars.DITTO_DASHBOARD_WANDB_URL }} ./scripts/update.sh'"
      - name: Health check
        # Hits the public Caddy endpoint, so it depends on public DNS + the VM's
        # cert being issued. Window is generous (≈3 min) for a first/cold deploy
        # (uv build + app import + Caddy ACME). A red here after a green deploy
        # step usually means DNS/cert, not the app.
        run: |
          host="${{ steps.target.outputs.host }}"
          for i in $(seq 1 20); do
            if curl -fsS "https://$host/health" >/dev/null; then
              echo "healthy: https://$host/health"; exit 0
            fi
            echo "waiting for health ($i/20)…"; sleep 9
          done
          echo "health check failed for https://$host/health" >&2
          exit 1
