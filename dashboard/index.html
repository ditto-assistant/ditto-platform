  <!--
    Public transparency dashboard for Bittensor Subnet 118 (Ditto).

    Static SPA built with Vite + SolidJS (bun run build -> dist/). No external
    requests at runtime, no secrets. All data comes from the platform's PUBLIC,
    aggregate-only read API and (for the deep dive) wandb.

    Configure the API base (in priority order):
      1. ?api=https://api.example.com/api/v1   (query string, handy for testing)
      2. <meta name="ditto:api-base" content="…">  (edit the tag below to bake in)
      3. same-origin "/api/v1"                  (default: dashboard served next to the API)

    wandb project link is configured the same way via ?wandb= or the meta tag.

    If the API can't be reached, the page renders an explicit unavailable state.
    It never substitutes example values for live subnet data.
  -->
  <meta name="ditto:api-base" content="" />
  <meta name="ditto:wandb-url" content="https://wandb.ai/" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%94%B7%3C/text%3E%3C/svg%3E" />

  <script>
    // Apply the saved theme before CSS paints to avoid a light/dark flash.
    (function () {
      "use strict";
      var STORAGE_KEY = "ditto:dashboard-theme";
      var MODES = { system: true, light: true, dark: true, time: true };

      function fromHour(hour) {
        if (hour >= 5 && hour < 8) return "dawn";
        if (hour >= 8 && hour < 12) return "morning";
        if (hour >= 12 && hour < 17) return "afternoon";
        if (hour >= 17 && hour < 20) return "dusk";
        return "night";
      }

      function readMode() {
        try {
          var saved = localStorage.getItem(STORAGE_KEY);
          return MODES[saved] ? saved : "system";
        } catch (e) {
          return "system";
        }
      }

      function apply(mode) {
        var next = MODES[mode] ? mode : "system";
        var root = document.documentElement;
        root.dataset.theme = next;
        root.dataset.systemTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
          ? "dark"
          : "light";
        root.dataset.timePhase = fromHour(new Date().getHours());
        return next;
      }

      window.__dittoDashboardTheme = {
        storageKey: STORAGE_KEY,
        fromHour: fromHour,
        readMode: readMode,
        apply: apply
      };
      apply(readMode());
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
