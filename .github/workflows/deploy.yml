name: Deploy

# Push to `dev`  -> deploy to the dev app VM  (ditto-platform-dev)
# Push to `main` -> deploy to the prod app VM (ditto-platform-prod)
#
# Persistent infra (VMs, Postgres, buckets, DNS, the deploy SA) is provisioned
# out of band by the infra repo's envs/gcp-platform Terraform + Ansible. This
# workflow only ships new code: it authenticates via Workload Identity Federation
# (no static keys), IAP-SSHes into the matching VM, and runs scripts/update.sh
# (fetch -> reset -> uv sync -> ensure Pylon -> migrate -> pm2 reload).
#
# GitHub secrets (no values committed):
#   Repo-level:
#     GCP_WIF_PROVIDER        full `github` WIF provider resource name
#                             (gcp-platform output `wif_provider`)
#     GCP_PLATFORM_DEPLOY_SA  github-actions-platform-deploy@ditto-app-dev.iam.gserviceaccount.com
#                             (gcp-platform output `platform_deploy_sa_email`)
#   Per-Environment (`dev` and `prod` GitHub Environments):
#     DITTO_UPLOAD_PAYMENT_ADDRESS  the env's SS58 upload-fee receive address.
#       Injected into the VM's .env at deploy time (NOT stored in infra). The
#       `prod` environment is where you add required reviewers if you want a
#       manual gate before prod deploys.

on:
  push:
    branches: [dev, main]

permissions:
  contents: read
  id-token: write # OIDC -> GCP WIF

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # GitHub Environment selects the per-env DITTO_UPLOAD_PAYMENT_ADDRESS secret
    # (and enables optional required-reviewer gating on prod).
    environment: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}
    env:
      GCP_ZONE: us-central1-a
    steps:
      - name: Resolve target from branch
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "vm=ditto-platform-prod"        >> "$GITHUB_OUTPUT"
            echo "host=platform-api.heyditto.ai" >> "$GITHUB_OUTPUT"
            echo "branch=main"                   >> "$GITHUB_OUTPUT"
          else
            echo "vm=ditto-platform-dev"             >> "$GITHUB_OUTPUT"
            echo "host=platform-api-dev.heyditto.ai" >> "$GITHUB_OUTPUT"
            echo "branch=dev"                        >> "$GITHUB_OUTPUT"
          fi

      - name: Verify deploy config
        # Fail with a legible message if the WIF secrets aren't set, instead of
        # the opaque "must specify exactly one of workload_identity_provider…".
        env:
          WIF: ${{ secrets.GCP_WIF_PROVIDER }}
          SA: ${{ secrets.GCP_PLATFORM_DEPLOY_SA }}
        run: |
          : "${WIF:?GCP_WIF_PROVIDER repo secret is not set — see this workflow's header}"
          : "${SA:?GCP_PLATFORM_DEPLOY_SA repo secret is not set — see this workflow's header}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PLATFORM_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy (IAP SSH -> scripts/update.sh)
        # DITTO_UPLOAD_PAYMENT_ADDRESS is the env-scoped GitHub secret; update.sh
        # upserts it into the VM's .env before (re)starting. It is a public
        # on-chain receive address, not a private key, so passing it on the
        # command line is fine.
        run: |
          gcloud compute ssh "${{ steps.target.outputs.vm }}" \
            --zone "$GCP_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "cd /opt/ditto-platform && sudo -u deploy env DITTO_DEPLOY_BRANCH=${{ steps.target.outputs.branch }} DITTO_UPLOAD_PAYMENT_ADDRESS='${{ secrets.DITTO_UPLOAD_PAYMENT_ADDRESS }}' ./scripts/update.sh"

      - name: Health check
        run: |
          host="${{ steps.target.outputs.host }}"
          for i in $(seq 1 10); do
            if curl -fsS "https://$host/health" >/dev/null; then
              echo "healthy: https://$host/health"; exit 0
            fi
            echo "waiting for health ($i/10)…"; sleep 6
          done
          echo "health check failed for https://$host/health" >&2
          exit 1
