name: Deploy production screener

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-screener.yml"
      - "scripts/update-screener.sh"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production-screener
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    env:
      GCP_PROJECT: ditto-app-dev
      GCP_ZONE: us-central1-a
      SCREENER_VM: ditto-screener-prod
    steps:
      - uses: actions/checkout@v4

      - name: Resolve ditto-subnet main
        id: subnet
        run: |
          sha="$(git ls-remote https://github.com/ditto-assistant/ditto-subnet.git refs/heads/main | cut -f1)"
          test -n "$sha"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Verify deploy configuration
        env:
          WIF: ${{ secrets.GCP_WIF_PROVIDER }}
          SA: ${{ secrets.GCP_PLATFORM_DEPLOY_SA }}
        run: |
          : "${WIF:?GCP_WIF_PROVIDER repo secret is not set}"
          : "${SA:?GCP_PLATFORM_DEPLOY_SA repo secret is not set}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_PLATFORM_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Copy updater to the isolated VM
        run: |
          gcloud compute scp scripts/update-screener.sh "$SCREENER_VM:/tmp/update-screener.sh" \
            --project "$GCP_PROJECT" \
            --zone "$GCP_ZONE" \
            --tunnel-through-iap \
            --quiet

      - name: Deploy exact subnet commit and verify
        env:
          SUBNET_SHA: ${{ steps.subnet.outputs.sha }}
        run: |
          gcloud compute ssh "$SCREENER_VM" \
            --project "$GCP_PROJECT" \
            --zone "$GCP_ZONE" \
            --tunnel-through-iap \
            --quiet \
            --command "sudo chmod 700 /tmp/update-screener.sh; sudo SCREENER_EXPECTED_SHA=$SUBNET_SHA /tmp/update-screener.sh; rc=\$?; sudo rm -f /tmp/update-screener.sh; exit \$rc"
