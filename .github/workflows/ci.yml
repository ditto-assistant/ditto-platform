name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  copy-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: faircopy
        run: npm run lint:copy -- --format github

  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        env:
          DITTO_SCREENER_PROTOCOL_READ_KEY: ${{ secrets.DITTO_SCREENER_PROTOCOL_READ_KEY }}
        run: |
          : "${DITTO_SCREENER_PROTOCOL_READ_KEY:?missing read-only screener protocol deploy key}"
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          printf '%s\n' "$DITTO_SCREENER_PROTOCOL_READ_KEY" > "$key_file"
          chmod 600 "$key_file"
          git config --global \
            url."ssh://git@github.com/ditto-assistant/ditto-screener.git".insteadOf \
            "https://github.com/ditto-assistant/ditto-screener.git"
          GIT_SSH_COMMAND="ssh -i $key_file -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            uv sync --group dev

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy ditto/

      - name: pytest
        run: uv run pytest
