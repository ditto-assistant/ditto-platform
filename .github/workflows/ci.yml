name: CI

on:
  pull_request:
  push:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  copy-lint:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: faircopy
        run: npm run lint:copy -- --format github

  dashboard:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Vite+
        run: curl -fsSL https://vite.plus | bash

      - name: Install dependencies
        working-directory: dashboard
        run: source "$HOME/.vite-plus/env" && vp install

      - name: Check
        working-directory: dashboard
        run: source "$HOME/.vite-plus/env" && vp check

      - name: Test
        working-directory: dashboard
        run: source "$HOME/.vite-plus/env" && vp test

      - name: build
        working-directory: dashboard
        run: source "$HOME/.vite-plus/env" && vp build

  lint-and-test:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_LINUX_X64_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --silent --show-error --location \
            --output "$RUNNER_TEMP/$asset" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/$asset"
          echo "$GITLEAKS_LINUX_X64_SHA256  $RUNNER_TEMP/$asset" | sha256sum --check
          tar --extract --gzip --file "$RUNNER_TEMP/$asset" --directory "$RUNNER_TEMP" gitleaks
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Scan working tree for secrets
        run: gitleaks dir . --no-banner --redact=100

      - name: Scan reachable Git history for secrets
        run: gitleaks git . --log-opts="--all" --no-banner --redact=100

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: ruff format check
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: mypy
        run: uv run mypy ditto/

      - name: pytest
        run: uv run pytest
